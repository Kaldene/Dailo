{% extends "base.html" %}

{% block title %}
Dailo | Вход
{% endblock %}

{% block content %}
<section class="section-login">
    <div class="container-login">
        <form method="POST" action="{{url_for('auth.login')}}" id="loginForm" class="login-card">
            <div class="login-info">
                <h2>Вход</h2>
                <p>Добро пожаловать обратно! Рады<br> видеть вас снова</p>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-box">
                    <img src="https://img.icons8.com/ios-filled/50/ffffff/new-post.png" alt="email" class="input-icon">
                    <input id="email" name="email" type="email" class="form-control" placeholder="Email" required="required">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <div class="input-box">
                    <img src="https://img.icons8.com/ios-filled/50/ffffff/lock-2.png" alt="password" class="input-icon">
                    <input id="password" name="password" type="password" class="form-control" placeholder="Password" required="required">
                </div>
            </div>

            <div class="login-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember">
                    <span>Запомнить меня</span>
                </label>

                <a href="#" class="forgot-password">Забыли пароль?</a>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <div class="login-btn">
                <button type="submit" id="submitBtn">Войти</button>
            </div>

            <div class="login-divider">
                <span>Или продолжите с</span>
            </div>

            <div class="social-login">
                <a href="#" class="social-btn">
                    <img src="{{ url_for('static', filename='img/icon/google-icon.png') }}" alt="Google">
                    <span>Google</span>
                </a>

                <a href="#" class="social-btn">
                    <img src="{{ url_for('static', filename='img/icon/github-icon.png') }}" alt="GitHub">
                    <span>GitHub</span>
                </a>
            </div>

            <div class="login-button">
                <p>Нет аккаунта? <a href="#">Зарегистрироваться</a></p>
            </div>
        </form>
    </div>
</section>
{% endblock %}

{% block scripts %}
{% endblock %}
